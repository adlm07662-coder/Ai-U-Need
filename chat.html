
<!DOCTYPE html>
<html>

<head>
<title>AI Chat</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
}

.chatbox{
height:70vh;
overflow:auto;
padding:20px;
}

.message{
margin:10px 0;
padding:10px;
border-radius:8px;
max-width:70%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#1e293b;
}

.input-area{
position:fixed;
bottom:0;
width:100%;
display:flex;
}

input{
flex:1;
padding:15px;
border:none;
font-size:16px;
}

button{
padding:15px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
}

</style>

</head>

<body>

<div class="header">
AI-U-Need Chat
</div>

<div id="chat" class="chatbox"></div>

<div class="input-area">

<input id="input" placeholder="Ask AI anything...">

<button onclick="sendMessage()">Send</button>

</div>

  

<script>
 async function sendMessage(){
let input = document.getElementById("input").value;
let chat = document.getElementById("chat");

chat.innerHTML += "<div class='user'>"+input+"</div>";

let response = await fetch("https://api.affiliateplus.xyz/api/chatbot",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:input,
botname:"AI-U-Need",
ownername:"Mohammed"
})
});

let data = await response.json();

chat.innerHTML += "<div class='ai'>"+data.message+"</div>";

document.getElementById("input").value="";

}

</script>

</body>

</html>
