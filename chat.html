<!DOCTYPE html>
<html>
<head>
<title>AI-U-Need Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b132b;
color:white;
}

.header{
background:#050a1f;
padding:15px;
text-align:center;
font-size:20px;
}

.chatbox{
height:80vh;
overflow-y:auto;
padding:10px;
}

.user{
background:#2563eb;
padding:10px;
margin:5px 0;
border-radius:5px;
}

.ai{
background:#1c293b;
padding:10px;
margin:5px 0;
border-radius:5px;
}

.input-area{
position:fixed;
bottom:0;
width:100%;
display:flex;
}

input{
flex:1;
padding:15px;
border:none;
font-size:16px;
}

button{
padding:15px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
}
</style>

</head>

<body>

<div class="header">
AI-U-Need Chat
</div>

<div id="chat" class="chatbox"></div>

<div class="input-area">
<input id="input" placeholder="Ask AI anything...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

async function sendMessage(){

let input = document.getElementById("input").value;
let chat = document.getElementById("chat");

if(input === "") return;

chat.innerHTML += "<div class='user'>" + input + "</div>";

document.getElementById("input").value = "";

try{

let response = await fetch(
"https://api.affiliateplus.xyz/api/chatbot?message="
+ encodeURIComponent(input) +
"&botname=AI-U-Need&ownername=Mohammed"
);

let data = await response.json();

chat.innerHTML += "<div class='ai'>" + data.message + "</div>";

chat.scrollTop = chat.scrollHeight;

}catch(error){

chat.innerHTML += "<div class='ai'>Error: AI server not responding</div>";

}

}

</script>

</body>
</html>
