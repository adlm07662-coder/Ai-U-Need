<div class="header">🤖 AI-U-Need Assistant</div>

<div id="chat" class="chatbox"></div>

<div class="input-area">
<input id="input" placeholder="Ask AI anything...">
<button id="sendBtn" onclick="sendMessage()">
🚀 Send
</button>
</div>
<script>

// LOAD CHAT HISTORY
window.onload = function(){
let saved = localStorage.getItem("ai-chat")
if(saved){
document.getElementById("chat").innerHTML = saved
}
}
inputBox.addEventListener("keydown", function(e){
if(e.key === "Enter"){
sendMessage()
}
})

async function sendMessage(){

let input = inputBox.value
let chat = document.getElementById("chat")

if(input === "") return

// show user message
let time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
chat.innerHTML += "<div class='user'>"+input+" <span class='time'>"+time+"</span></div>"
inputBox.value=""
localStorage.setItem("ai-chat", chat.innerHTML)
  localStorage.setItem("ai-chat", chat.innerHTML)

  // typing indicator
chat.innerHTML += `
<div class='ai typing'>
<span></span>
<span></span>
<span></span>
</div>
`
chat.scrollTo({
  top: chat.scrollHeight,
  behavior: "smooth"
})
try{

let response = await fetch("https://python-playground--adlm07662.replit.app/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    message: input
  })
});

let data = await response.json()

// remove typing safely
let typing = document.getElementById("typing")
if(typing) typing.remove()

// IMPORTANT FIX 👇
streamText(data.response)

}catch{

let typing = document.getElementById("typing")
if(typing) typing.remove()

chat.innerHTML += `
<div class="ai" id="typing">
<div class="typing">
<span></span>
<span></span>
<span></span>
</div>
</div>
`
}

}

// typing animation
function typeText(text){

let chat = document.getElementById("chat")

let bubble = document.createElement("div")
bubble.className = "ai"

chat.appendChild(bubble)

let i = 0

let typing = setInterval(function(){

let time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
bubble.innerHTML = text + " <span class='time'>" + time + "</span>"
i++

chat.scrollTo({
  top: chat.scrollHeight,
  behavior: "smooth"
})

if(i >= text.length){
clearInterval(typing)
}

},20)

}

function streamText(text){

let chat = document.getElementById("chat")

let bubble = document.createElement("div")
bubble.className = "ai"

chat.appendChild(bubble)

let i = 0

let typing = setInterval(function(){

bubble.innerHTML = text.substring(0,i)
bubble.innerHTML += 
"<br><button onclick='copyText(this)'>📋 Copy</button>"
  
i++

chat.scrollTop = chat.scrollHeight

if(i >= text.length){
clearInterval(typing)
}

}, 20)

}
}
function copyText(btn){

let text = btn.parentElement.innerText

navigator.clipboard.writeText(text)

btn.innerHTML = "✅ Copied"

setTimeout(()=>{
btn.innerHTML = "📋 Copy"
},1500)

}
async function askAI(message){

let response = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"user",content:message}
]
})
})

let data = await response.json()

return data.choices[0].message.content
}
let reply = await askAI(input)

streamText(reply)
