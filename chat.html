<style>

100%{opacity:0.2}
}

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f172a,#020617);
margin:0;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
.header{
text-align:center;
padding:15px;
font-size:20px;
font-weight:bold;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CHAT AREA */
.chatbox{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

/* USER MESSAGE */
.user{
align-self:flex-end;
background:#2563eb;
padding:10px 14px;
border-radius:15px 15px 5px 15px;
max-width:70%;
}

/* AI MESSAGE */
.ai{
align-self:flex-start;
background:#1e293b;
padding:10px 14px;
border-radius:15px 15px 15px 5px;
max-width:70%;
}

/* INPUT AREA */
.input-area{
display:flex;
padding:10px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
gap:10px;
}

/* INPUT */
#input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
outline:none;
font-size:15px;
}

/* SEND BUTTON */
#sendBtn{
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

#sendBtn:hover{
transform:scale(1.05);
}

#sendBtn:hover{
transform:scale(1.05);
box-shadow:0 0 12px rgba(0,150,255,0.7);
}

#sendBtn:active{
transform:scale(0.95);
}

/* TYPING DOTS */
.typing{
display:flex;
gap:4px;
}

.typing span{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 1s infinite;
}

.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}

@keyframes blink{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}
</style>
<div class="header">🤖 AI-U-Need Assistant</div>

<div id="chat" class="chatbox"></div>

<div class="input-area">
<input id="input" placeholder="Ask AI anything...">
<button id="sendBtn" onclick="sendMessage()">
🚀 Send
</button>
</div>

<script>

let inputBox = document.getElementById("input")

inputBox.addEventListener("keydown", function(e){
if(e.key === "Enter"){
sendMessage()
}
})

async function sendMessage(){

let input = inputBox.value
let chat = document.getElementById("chat")

if(input === "") return

// show user message
chat.innerHTML += "<div class='user'>"+input+"</div>"
inputBox.value=""

// typing indicator
chat.innerHTML += `
<div class="typing" id="typing">
<span></span>
<span></span>
<span></span>
</div>
`
chat.scrollTop = chat.scrollHeight

try{

let response = await fetch("https://python-playground--adlm07662.replit.app/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    message: input
  })
});

let data = await response.json()

// remove typing safely
let typing = document.getElementById("typing")
if(typing) typing.remove()

// IMPORTANT FIX 👇
typeText(data.response)

}catch{

let typing = document.getElementById("typing")
if(typing) typing.remove()

chat.innerHTML += `
<div class="ai" id="typing">
<div class="typing">
<span></span>
<span></span>
<span></span>
</div>
</div>
`
}

}

// typing animation
function typeText(text){

let chat = document.getElementById("chat")

let bubble = document.createElement("div")
bubble.className = "ai"

chat.appendChild(bubble)

let i = 0

let typing = setInterval(function(){

bubble.innerHTML += text.charAt(i)
i++

chat.scrollTop = chat.scrollHeight

if(i >= text.length){
clearInterval(typing)
}

},20)

}

</script>

</body>
</html>
