<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI-U-Need Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1a2b;
color:white;
}

.header{
background:#000;
padding:15px;
text-align:center;
font-size:18px;
}

.chatbox{
height:75vh;
overflow-y:auto;
padding:10px;
}

.user{
background:#2979ff;
padding:10px;
margin:5px;
border-radius:8px;
}

.ai{
background:#1e2a38;
padding:10px;
margin:5px;
border-radius:8px;
}

.input-area{
display:flex;
position:fixed;
bottom:0;
width:100%;
}

input{
flex:1;
padding:12px;
border:none;
}

button{
padding:12px;
background:#28a745;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="header">AI-U-Need Chat</div>

<div id="chat" class="chatbox"></div>

<div class="input-area">
<input id="input" placeholder="Ask AI anything...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

let inputBox = document.getElementById("input")

inputBox.addEventListener("keydown", function(e){
if(e.key === "Enter"){
sendMessage()
}
})

async function sendMessage(){

let input = inputBox.value
let chat = document.getElementById("chat")

if(input === "") return

// show user message
chat.innerHTML += "<div class='user'>"+input+"</div>"
inputBox.value=""

// typing indicator
chat.innerHTML += "<div class='ai' id='typing'>AI is typing...</div>"
chat.scrollTop = chat.scrollHeight

try{

let response = await fetch("https://python-playground--adlm07662.replit.app/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    message: input
  })
});
"Content-Type": "application/json"
},
body: JSON.stringify({
message: input
})
})

let data = await response.json()

// remove typing safely
let typing = document.getElementById("typing")
if(typing) typing.remove()

// IMPORTANT FIX 👇
typeText(data.response)

}catch{

let typing = document.getElementById("typing")
if(typing) typing.remove()

chat.innerHTML += "<div class='ai'>❌ AI server offline</div>"

}

}

// typing animation
function typeText(text){

let chat = document.getElementById("chat")

let bubble = document.createElement("div")
bubble.className = "ai"

chat.appendChild(bubble)

let i = 0

let typing = setInterval(function(){

bubble.innerHTML += text.charAt(i)
i++

chat.scrollTop = chat.scrollHeight

if(i >= text.length){
clearInterval(typing)
}

},20)

}

</script>

</body>
</html>
