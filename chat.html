<!DOCTYPE html>
<html>

<head>
<title>AI-U-Need Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b132b;
color:white;
}

.header{
background:#050a1f;
padding:15px;
text-align:center;
font-size:20px;
}

.chatbox{
height:80vh;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
}

.user{
background:#2563eb;
padding:10px;
margin:5px 0;
border-radius:8px;
align-self:flex-end;
max-width:70%;
}

.ai{
background:#1c293b;
padding:10px;
margin:5px 0;
border-radius:8px;
align-self:flex-start;
max-width:70%;
}

.typing{
font-style:italic;
opacity:0.7;
}

.input-area{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#050a1f;
}

input{
flex:1;
padding:15px;
border:none;
font-size:16px;
outline:none;
}

button{
padding:15px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
AI-U-Need Chat
</div>

<div id="chat" class="chatbox"></div>

<div class="input-area">
<input id="input" placeholder="Ask AI anything...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

let inputBox = document.getElementById("input")

inputBox.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage()
}
})

async function sendMessage(){

let input = inputBox.value
let chat = document.getElementById("chat")

if(input==="") return

chat.innerHTML += "<div class='user'>"+input+"</div>"

inputBox.value=""

chat.innerHTML += "<div class='ai typing' id='typing'>AI is typing...</div>"

chat.scrollTop = chat.scrollHeight

try{

let response = await fetch(
"https://api.popcat.xyz/chatbot?msg="
+ encodeURIComponent(input)
+ "&owner=Mohammed&botname=AI-U-Need"
)

let data = await response.json()

document.getElementById("typing").remove()

typeText(data.response)

}catch{

document.getElementById("typing").remove()

chat.innerHTML += "<div class='ai'>AI server offline</div>"

}

}

function typeText(text){

let chat = document.getElementById("chat")

let bubble = document.createElement("div")
bubble.className="ai"

chat.appendChild(bubble)

let i=0

let typing = setInterval(function(){

bubble.innerHTML += text.charAt(i)

i++

chat.scrollTop = chat.scrollHeight

if(i>=text.length){
clearInterval(typing)
}

},20)

}

</script>

</body>

</html>
